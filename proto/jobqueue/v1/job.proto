syntax = "proto3";

package jobqueue.v1;

import "google/protobuf/timestamp.proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
  JOB_STATUS_CANCELLED = 5;
}

message Job {
  string id = 1;
  string task_type = 2;
  bytes payload = 3;
  JobStatus status = 4;
  int32 timeout_seconds = 5;
  bytes result = 6;
  string error = 7;
  string assigned_worker_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp finished_at = 11;
}

message JobStatusChanged {
  JobStatus old_status = 1;
  JobStatus new_status = 2;
}

message JobProgress {
  int32 percent = 1;
  string message = 2;
}

message JobLog {
  string line = 1;
}

message JobEvent {
  string job_id = 1;
  google.protobuf.Timestamp at = 2;
  oneof event {
    JobStatusChanged status_changed = 3;
    JobProgress progress = 4;
    JobLog log = 5;
  }
}